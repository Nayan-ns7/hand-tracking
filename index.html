<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Hand Tracker</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #050510;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    
    #videoElement {
      display: none; /* Hidden, we only render the canvas */
    }
    
    #outputCanvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Mirror by default for front camera */
    }
    
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.5rem;
      font-weight: 600;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      z-index: 10;
      pointer-events: none;
      letter-spacing: 2px;
      text-align: center;
    }
    .ui-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 20;
    }
    
    button {
      background: rgba(10, 10, 30, 0.7);
      border: 1px solid #00ffff;
      color: #00ffff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(5px);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    button:hover {
      background: #00ffff;
      color: #000;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.9);
      transform: scale(1.05);
    }
  </style>
  
  <!-- MediaPipe dependencies loaded from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="loadingText" class="loading">Loading AI Models...</div>
  <video id="videoElement" playsinline autoplay></video>
  <canvas id="outputCanvas"></canvas>
  
  <div class="ui-container">
    <button id="switchCameraBtn">Switch Camera</button>
  </div>
  <script>
    const videoElement = document.getElementById('videoElement');
    const canvasElement = document.getElementById('outputCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingText = document.getElementById('loadingText');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    let currentFacingMode = 'user';
    let currentStream = null;
    let isProcessingFace = false;
    let latestVideoFrame = null;
    let latestFaceResults = null;
    let renderRequested = false;
    let lastVideoTime = -1;


    // Initialize MediaPipe Face Mesh
    const faceMesh = new FaceMesh({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }});
    
    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });
    faceMesh.onResults((results) => {
      latestVideoFrame = results.image;
      latestFaceResults = results;
      requestRender();
    });
    // Update mirroring logic for canvas based on camera perspective
    function updateMirroring() {
      if (currentFacingMode === 'user') {
        canvasElement.style.transform = 'scaleX(-1)';
      } else {
        canvasElement.style.transform = 'scaleX(1)';
      }
    }
    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: currentFacingMode
          }
        });
        currentStream = stream;
        videoElement.srcObject = stream;
        
        await videoElement.play();
        updateMirroring();
        
        // Start processing loop
        requestAnimationFrame(renderLoop);
      } catch (err) {
        console.error("Error accessing camera:", err);
        loadingText.innerText = "Camera Access Required";
        loadingText.style.color = "#ff0055";
        loadingText.style.textShadow = "0 0 15px #ff0055";
      }
    }
    function requestRender() {
      if (!renderRequested) {
        renderRequested = true;
        requestAnimationFrame(renderUnified);
      }
    }

    // Manual processing loop using requestAnimationFrame for optimal low-latency syncing
    function renderLoop() {
      if (videoElement.readyState >= 2 && videoElement.videoWidth && videoElement.videoHeight) {
        if (videoElement.currentTime !== lastVideoTime) {
          lastVideoTime = videoElement.currentTime;
          
          if (canvasElement.width !== videoElement.videoWidth) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
          }
          
          // Process Face Mesh asynchronously
          if (!isProcessingFace) {
            isProcessingFace = true;
            faceMesh.send({image: videoElement}).catch(e => console.error(e)).finally(() => isProcessingFace = false);
          }
        }
      }
      requestAnimationFrame(renderLoop);
    }

    function renderUnified() {
      renderRequested = false;
      if (loadingText.style.display !== 'none') {
        loadingText.style.display = 'none';
      }
      if (!latestVideoFrame) return;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Background Image with dark overlay
      canvasCtx.drawImage(latestVideoFrame, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.fillStyle = 'rgba(10, 10, 15, 0.75)';
      canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

      // Draw Face Mesh (Iron Man UI aesthetic)
      if (latestFaceResults && latestFaceResults.multiFaceLandmarks) {
        for (const landmarks of latestFaceResults.multiFaceLandmarks) {
          canvasCtx.beginPath();
          if (typeof FACEMESH_TESSELLATION !== 'undefined') {
            FACEMESH_TESSELLATION.forEach(([startIdx, endIdx]) => {
              const p1 = landmarks[startIdx];
              const p2 = landmarks[endIdx];
              canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
              canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
            });
            // High-poly, very thin neon blue lines
            canvasCtx.strokeStyle = 'rgba(0, 229, 255, 0.4)'; 
            canvasCtx.lineWidth = 0.5;
            canvasCtx.shadowColor = 'rgba(0, 229, 255, 0.8)';
            canvasCtx.shadowBlur = 4;
            canvasCtx.stroke();
          }
        }
      }
      canvasCtx.restore();
    }
    switchCameraBtn.addEventListener('click', () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      loadingText.style.display = 'block';
      loadingText.innerText = "Switching camera...";
      startCamera();
    });
    // Boot everything up
    async function initModels() {
      try {
        loadingText.innerText = "Loading Face AI...";
        await faceMesh.initialize();
        loadingText.innerText = "Starting Camera...";
        startCamera();
      } catch(err) {
        console.error(err);
        loadingText.innerText = "Error Loading: " + err.message;
        loadingText.style.color = "red";
        loadingText.style.textShadow = "0 0 15px red";
      }
    }
    initModels();
  </script>
</body>
</html>
